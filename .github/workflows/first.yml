name: Our First Workflow         # Workflow 이름 (GitHub Actions 탭에서 표시됨)

on: push                         # GitHub 저장소에 코드가 push될 때마다 자동 실행

jobs:                            # 실행할 작업(Job)들을 정의하는 영역
  build-test:                    # Job 이름 (임의로 지정 가능)
    runs-on: windows-latest      # Windows 최신 환경에서 실행 (MSVC 사용을 위해 Windows 선택)

    steps:                       # Job 안에서 순차적으로 실행할 단계들

      - uses: actions/checkout@v3
        # 현재 GitHub 저장소의 코드를 가상 실행 환경으로 가져오는 단계
        # 이 단계가 있어야 main.c, plus.c, test.c 파일을 사용할 수 있음

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        # MSVC 컴파일러(cl.exe)를 사용할 수 있도록 Visual Studio 개발자 환경 설정
        # Windows에서 C 코드를 MSVC로 컴파일하려면 필요

      # ✅ main.c와 test.c는 각각 main()이 있으므로, 한 번에 같이 빌드하면 링크 에러가 발생함
      #    따라서 실행 파일을 2개로 분리해서 빌드해야 함

      - name: Build (app)
        run: cl /nologo /W4 main.c plus.c /Fe:main.exe
        # main.c + plus.c 를 컴파일/링크하여 main.exe 생성 (실제 프로그램)

      - name: Build (tests)
        run: cl /nologo /W4 test.c plus.c /Fe:test.exe
        # test.c + plus.c 를 컴파일/링크하여 test.exe 생성 (테스트 전용 실행 파일)

      - name: Test
        run: .\test.exe
        # test.exe 실행
        # test.c가 return 0이면 성공, return 1(또는 exit code != 0)이면 Workflow 실패로 처리됨
